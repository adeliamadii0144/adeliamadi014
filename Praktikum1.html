<<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Sederhana - Tugas SCM</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    background-color: #f0f2f5; 
}

.calculator { 
    background: #ffffff; 
    padding: 20px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    width: 300px; 
}

h3 { text-align: center; color: #333; }

input { 
    width: 100%; 
    height: 50px; 
    text-align: right; 
    margin-bottom: 15px; 
    font-size: 22px; 
    padding: 10px; 
    box-sizing: border-box; 
    border: 2px solid #eee; 
    border-radius: 6px; 
}

.buttons { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 10px; 
}

button { 
    padding: 15px; 
    font-size: 18px; 
    cursor: pointer; 
    border: none; 
    border-radius: 8px; 
    background: #f8f9fa; 
}

button:hover { background-color: #e2e6ea; }

.operator { background-color: #ff9f0a; color: white; }
.equal { background-color: #34c759; color: white; grid-column: span 2; }
.clear { background-color: #ff3b30; color: white; grid-column: span 2; }

/* HISTORY STYLE */
.history {
    margin-top: 15px;
    max-height: 120px;
    overflow-y: auto;
    border-top: 1px solid #ddd;
    padding-top: 10px;
}

.history h4{
    margin:0;
    font-size:14px;
    color:#555;
}

.history-item{
    font-size:14px;
    padding:3px 0;
    color:#333;
}
</style>

</head>
<body>

<div class="calculator">

<h3>Kalkulator Sederhana</h3>

<input type="text" id="display" readonly placeholder="0">

<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendToDisplay('/')">/</button>
<button class="operator" onclick="appendToDisplay('*')">*</button>

<button onclick="appendToDisplay('7')">7</button>
<button onclick="appendToDisplay('8')">8</button>
<button onclick="appendToDisplay('9')">9</button>
<button class="operator" onclick="appendToDisplay('-')">-</button>

<button onclick="appendToDisplay('4')">4</button>
<button onclick="appendToDisplay('5')">5</button>
<button onclick="appendToDisplay('6')">6</button>
<button class="operator" onclick="appendToDisplay('+')">+</button>

<button onclick="appendToDisplay('1')">1</button>
<button onclick="appendToDisplay('2')">2</button>
<button onclick="appendToDisplay('3')">3</button>
<button onclick="appendToDisplay('.')">.</button>

<button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
<button class="equal" onclick="calculate()">=</button>
</div>

<!-- HISTORY -->
<div class="history">
<h4>History</h4>
<div id="historyList"></div>
</div>

</div>

<script>

const display = document.getElementById('display');
const historyList = document.getElementById('historyList');

function appendToDisplay(input) {
    display.value += input;
}

function clearDisplay() {
    display.value = "";
}

function calculate() {
    try {

        let expression = display.value;
        let result = eval(expression);

        display.value = result;

        addHistory(expression + " = " + result);

    } catch (error) {
        display.value = "Error";
        setTimeout(clearDisplay,1500);
    }
}

function addHistory(text){

    const item = document.createElement("div");
    item.className = "history-item";
    item.textContent = text;

    historyList.prepend(item);

}

</script>

</body>
</html>
